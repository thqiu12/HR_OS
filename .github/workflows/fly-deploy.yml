name: Fly Deploy

# Trigger on:
#   - Every push to main (auto-deploy)
#   - Manual button click in the Actions tab (workflow_dispatch)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid two deploys racing on quick consecutive pushes:
# a new push cancels the in-flight deploy for the same ref.
concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy hr-os-f5mozg
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config fly.toml -a hr-os-f5mozg
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
